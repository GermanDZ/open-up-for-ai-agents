# docs/project-config.yaml — project-owned context + rules, injected into every
# /openup-create-* artifact prompt. Copy this file to docs/project-config.yaml and
# edit it for your project. It is OPTIONAL: if the file is absent, the framework
# defaults apply unchanged.
#
# Full mechanism + precedence: docs-eng-process/project-config.md
#
# Two top-level keys:
#   context: project-level facts the framework can't infer. Injected verbatim as
#            <project-context> into every create-* prompt.
#   rules:   per-artifact criteria, ADDITIVE to the framework rubric (they may add
#            a criterion, never waive one). Keyed by artifact type = the
#            /openup-create-<type> skill suffix. Injected as <project-rules> into
#            that artifact's prompt only.

context: |
  Tech stack: <e.g. TypeScript, React, Node.js, Postgres>
  Domain: <e.g. B2B payments — PCI-DSS in scope>
  Key stakeholders: <names/roles the specs should reference by name>

rules:
  vision:
    - <e.g. State the single business metric this vision is meant to move>
  use-case:
    - <e.g. Reference a named stakeholder, never the generic "the user">
  architecture-notebook:
    - <e.g. Record the data-residency decision for any new datastore>
  iteration-plan: []
  task-spec:
    - <e.g. Any auth-touching task must cite the compliance control it affects>
  test-plan:
    - <e.g. Include at least one negative / abuse-case test per feature>
  risk-list: []

# trace_rules: project-side knob for the doc-traceability commit hook (T-039).
# Defaults — enabled, coverage on, severity from trace-model.json — match the
# framework recommendation; uncomment any sub-key to tailor.
# trace_rules:
#   enabled: true                # set false to skip the hook entirely
#   coverage: true               # set false to drop --coverage from the hook run
#   severity:                    # per-rule override; key = "type -> relation -> target"
#     "requirement -> verified-by -> test-case": advisory

# process: OpenUP's Development Case made machine-readable (T-076). An archetype
# sets per-phase defaults (iteration budgets, required artifacts, exit criteria,
# milestone-review formality); any explicit phases: key overrides that default.
# Absent = framework defaults apply. Structurally validated by check-docs.py.
# Full archetype tables + precedence: docs-eng-process/project-config.md
# process:
#   archetype: product           # quick | mvp | product  (sets the defaults below)
#   phases:                      # optional per-phase overrides of the archetype
#     inception:    { iterations: 1, artifacts: [vision, use-case-outline, risk-list] }
#     elaboration:  { iterations: auto, artifacts: [architecture-notebook, detailed-use-cases, test-plan], exit: architecture-validated }
#     construction: { iterations: many, parallel: true }
#     transition:   { gate: human }
#   milestone_review: human      # human | auto-assess (auto only for minor milestones)
